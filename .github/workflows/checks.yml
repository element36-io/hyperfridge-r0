name: Check Set-Up & Build

# Controls when the action will run.
on:
  # Triggers the workflow on push or pull request events but only for the master branch
  push:
    branches: [main]
  pull_request:
    branches: [main]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  check:
    # The type of runner that the job will run on
    runs-on: ubuntu-22.04

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: Install linux dependencies
        run: sudo apt-get update && sudo apt-get install -y clang libssl-dev llvm libudev-dev protobuf-compiler

      - name: Install Rust and RISC Zero toolchain
        run: |
          rustup install 1.89
          rustup default 1.89
          rustup target add wasm32-unknown-unknown
          rustup component add rustfmt clippy
          curl -L https://risczero.com/install | bash
          export PATH="$HOME/.risc0/bin:$PATH"
          echo "$HOME/.risc0/bin" >> $GITHUB_PATH
          rzup install rust

      - name: Build
        run: |
          RUST_BACKTRACE=1 RISC0_DEV_MODE=true cargo build --release

      - name: Run tests
        run: |
          RISC0_DEV_MODE=true cargo test

      - name: Run coverage
        continue-on-error: true
        run: |
          cargo install cargo-tarpaulin
          RISC0_DEV_MODE=true cargo tarpaulin --verbose --workspace --timeout 600 --out xml

      - name: Run tests in guest module
        run: |
          (cd methods/guest &&
          RUST_BACKTRACE=1 RISC0_DEV_MODE=true cargo test --features debug_mode -- --nocapture)

      - name: Upload to codecov.io
        continue-on-error: true
        uses: codecov/codecov-action@v4
        with:
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Run fmt
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: |
          RISC0_DEV_MODE=true RISC0_SKIP_BUILD=1 cargo clippy --all-targets
